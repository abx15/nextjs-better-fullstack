name: Release Management

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Is this a prerelease?'
        required: true
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '10.26.1'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      releases: write
      
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Generate changelog
      id: changelog
      run: |
        # Get previous tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        # Generate changelog
        if [ -n "$PREVIOUS_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)")
        fi
        
        # Save to file
        echo "$CHANGELOG" > CHANGELOG.md
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        release_name: SarkariSaathi ${{ steps.version.outputs.VERSION }}
        body: |
          ## 🎉 SarkariSaathi ${{ steps.version.outputs.VERSION }}
          
          ### 🚀 What's New
          ${{ steps.changelog.outputs.changelog }}
          
          ### 📦 Installation
          ```bash
          git clone https://github.com/abx15/nextjs-better-fullstack.git
          cd SarkariSaathi
          git checkout ${{ steps.version.outputs.VERSION }}
          pnpm install
          pnpm run dev
          ```
          
          ### 📖 Documentation
          - [User Guide](https://sarkari-saathi.vercel.app/docs)
          - [API Reference](https://sarkari-saathi.vercel.app/api-docs)
          - [Contributing Guide](CONTRIBUTING.md)
          
          ### 🙏 Acknowledgments
          Thanks to all contributors who made this release possible!
          
          ---
          
          **🏛️ SarkariSaathi - Empowering Every Indian with Government Schemes**
          
          *सरकारी योजनाओं का लाभ हर भारतीय तक पहुंचाना*
        draft: false
        prerelease: ${{ github.event.inputs.prerelease == 'true' || contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}

  build-and-upload:
    name: Build and Upload Assets
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Build application
      run: pnpm run build
      env:
        NODE_ENV: production
        
    - name: Create distribution zip
      run: |
        mkdir -p dist
        cp -r apps/web/.next dist/
        cp -r apps/web/public dist/
        cp -r apps/web/package.json dist/
        cp -r apps/web/next.config.ts dist/
        cp -r packages dist/
        cp package.json dist/
        cp pnpm-workspace.yaml dist/
        cp README.md dist/
        cp LICENSE dist/
        cd dist
        zip -r ../sarkarisaathi-${{ needs.create-release.outputs.release_id }}.zip .
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./sarkarisaathi-${{ needs.create-release.outputs.release_id }}.zip
        asset_name: sarkarisaathi-${{ needs.create-release.outputs.release_id }}.zip
        asset_content_type: application/zip

  docker-release:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/sarkarisaathi:latest
          ${{ secrets.DOCKER_USERNAME }}/sarkarisaathi:${{ steps.version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        
    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ secrets.DOCKER_USERNAME }}/sarkarisaathi:${{ steps.version.outputs.VERSION }}
        format: spdx-json
        output-file: sbom.spdx.json
        
    - name: Upload SBOM to release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: sbom.spdx.json
        asset_name: sbom.spdx.json
        asset_content_type: application/json

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, build-and-upload, docker-release]
    if: always()
    
    steps:
    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Send Discord notification
      uses: sarisia/actions-status-discord@v1
      if: needs.create-release.result == 'success'
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: "🎉 SarkariSaathi ${{ steps.version.outputs.VERSION }} Released!"
        description: |
          New version of SarkariSaathi has been released!
          
          **Version**: ${{ steps.version.outputs.VERSION }}
          **Release Notes**: https://github.com/abx15/nextjs-better-fullstack/releases/tag/${{ steps.version.outputs.VERSION }}
          **Docker Image**: docker pull ${{ secrets.DOCKER_USERNAME }}/sarkarisaathi:${{ steps.version.outputs.VERSION }}
          
          Download and try it now! 🚀
        color: 0x00ff00
        username: SarkariSaathi Bot
        avatar_url: https://img.shields.io/badge/🏛️-SarkariSaathi-FF6B00?style=for-the-badge
        
    - name: Send Twitter notification
      uses: ethomson/send-tweet-action@v1
      if: needs.create-release.result == 'success'
      with:
        consumer-key: ${{ secrets.TWITTER_CONSUMER_KEY }}
        consumer-secret: ${{ secrets.TWITTER_CONSUMER_SECRET }}
        access-token: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        access-token-secret: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        tweet: |
          🎉 SarkariSaathi ${{ steps.version.outputs.VERSION }} is now available!
          
          🏛️ AI-powered government scheme discovery platform
          🌍 Complete Hindi/English bilingual support
          📱 Mobile-first responsive design
          
          Download: https://github.com/abx15/nextjs-better-fullstack/releases/tag/${{ steps.version.outputs.VERSION }}
          
          #SarkariSaathi #OpenSource #GovTech #India
